# Ring of the Middle Earth — Option B (Go) stack.
#
#   make up        -> start everything
#   make topics    -> create the 10 topics
#   make schemas   -> register Avro schemas
#
# The 3 Go instances (go-1/2/3) share GROUP_ID=rotr-engine, so killing one
# triggers a Kafka consumer-group rebalance and the others take over its
# partitions — Demo Scenario 3 / criterion B2 (spec §26).
#
# NOTE: single Kafka broker for laptop friendliness => replication-factor 1.
# The graded K1 config (replication 3) needs a 3-broker cluster; scale `kafka`
# accordingly and set REPL=3 when creating topics.
services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,EXTERNAL://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: "ROtRMiddleEarthCluster1"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    hostname: schema-registry
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8085:8085"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "PLAINTEXT://kafka:29092"
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8085"

  go-1: &goinstance
    build:
      context: ./option-b
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: "kafka:29092"
      GROUP_ID: "rotr-engine"
      INSTANCE_ID: "go-1"
    command: ["-addr", ":8080", "-config", "/config", "-auto"]
    volumes:
      - ./config:/config:ro
    ports:
      - "8081:8080"

  go-2:
    <<: *goinstance
    environment:
      KAFKA_BROKERS: "kafka:29092"
      GROUP_ID: "rotr-engine"
      INSTANCE_ID: "go-2"
    ports:
      - "8082:8080"

  go-3:
    <<: *goinstance
    environment:
      KAFKA_BROKERS: "kafka:29092"
      GROUP_ID: "rotr-engine"
      INSTANCE_ID: "go-3"
    ports:
      - "8083:8080"
